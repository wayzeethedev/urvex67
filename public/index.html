<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Urban exploration location database and map" />
  <meta name="permissions-policy" content="geolocation=(self)" />
  <title>URBEX — Location Database</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>

  <header id="app-header">
    <div class="header-left">
      <span class="logo-text">URBEX<span class="logo-dot">·</span>DB</span>
    </div>
    <div class="header-center">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none">
          <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M13 13l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search locations…" autocomplete="off" />
        <button id="search-clear" class="search-clear" title="Clear" style="display:none">✕</button>
      </div>
    </div>
    <div class="header-right">
      <div id="location-count" class="location-count">— sites</div>
    </div>
  </header>

  <div id="map"></div>

  <div id="add-mode-banner" class="add-mode-banner hidden">
    <span>📍 Click the map to place a marker</span>
    <button id="cancel-add-mode">Cancel</button>
  </div>

  <button id="fab-add" class="fab" title="Add location">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
  </button>

  <button id="locate-btn" class="locate-btn" title="Center on my location">
    <svg viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
      <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </button>

  <div id="loading-overlay" class="loading-overlay">
    <div class="loader-inner">
      <div class="loader-ring"></div>
      <span class="loader-label">LOADING SITES</span>
    </div>
  </div>

  <!-- ADD / EDIT MODAL -->
  <div id="form-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true">
    <div class="modal-box form-modal-box">
      <button class="modal-close" data-close="form-modal">✕</button>
      <h2 id="form-modal-title" class="modal-title">ADD LOCATION</h2>
      <div class="form-group">
        <label for="f-title">Title</label>
        <input type="text" id="f-title" placeholder="Site name…" />
      </div>
      <div class="form-group">
        <label for="f-desc">Description</label>
        <textarea id="f-desc" rows="3" placeholder="Notes about this location…"></textarea>
      </div>
      <div class="form-group">
        <label for="f-image">Image URL</label>
        <input type="url" id="f-image" placeholder="https://…" />
      </div>
      <div class="coords-row">
        <div class="form-group half">
          <label for="f-lat">Latitude</label>
          <input type="number" id="f-lat" step="any" placeholder="0.000000" />
        </div>
        <div class="form-group half">
          <label for="f-lng">Longitude</label>
          <input type="number" id="f-lng" step="any" placeholder="0.000000" />
        </div>
      </div>
      <div class="modal-actions">
        <button id="form-cancel" class="btn btn-ghost" data-close="form-modal">Cancel</button>
        <button id="form-submit" class="btn btn-primary">Save Location</button>
      </div>
    </div>
  </div>

  <!-- DETAIL MODAL -->
  <div id="detail-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true">
    <div class="modal-box detail-modal-box">
      <button class="modal-close" data-close="detail-modal">✕</button>
      <div id="detail-image-wrap" class="detail-image-wrap">
        <img id="detail-image" src="" alt="Location image" />
        <div class="detail-image-overlay"><span>↗ Enlarge</span></div>
      </div>
      <div class="detail-body">
        <div class="detail-header-row">
          <h2 id="detail-title" class="detail-title"></h2>
          <span id="detail-visited-badge" class="visited-badge unvisited">UNVISITED</span>
        </div>
        <p id="detail-desc" class="detail-desc"></p>
        <div class="detail-coords-row">
          <svg class="pin-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 2a5 5 0 00-5 5c0 3.5 5 11 5 11s5-7.5 5-11a5 5 0 00-5-5zm0 7a2 2 0 110-4 2 2 0 010 4z" clip-rule="evenodd"/>
          </svg>
          <span id="detail-coords" class="detail-coords"></span>
          <div class="coords-actions">
            <button id="open-apple-maps" class="btn-maps btn-apple">Apple Maps</button>
            <button id="open-google-maps" class="btn-maps btn-google">Google Maps</button>
          </div>
        </div>
        <div class="detail-actions">
          <button id="detail-visited-toggle" class="btn btn-primary">Mark as Visited</button>
          <button id="detail-edit" class="btn btn-ghost">Edit</button>
          <button id="detail-delete" class="btn btn-danger">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox hidden">
    <div class="lightbox-backdrop" id="lightbox-backdrop"></div>
    <img id="lightbox-img" src="" alt="Enlarged view" />
    <button class="lightbox-close" id="lightbox-close">✕</button>
  </div>

  <!-- CONFIRM DIALOG -->
  <div id="confirm-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true">
    <div class="modal-box confirm-box">
      <h3 class="confirm-title">Delete this location?</h3>
      <p class="confirm-msg">This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="btn btn-ghost">Cancel</button>
        <button id="confirm-ok" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="app.js"></script>
</body>
</html>
